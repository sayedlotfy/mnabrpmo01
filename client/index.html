<!doctype html>
<html lang="ar" dir="rtl">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Design PMO - نظام إدارة مشاريع التصميم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- IBM Plex Arabic: واجهة العربية -->
    <!-- IBM Plex Sans: واجهة الإنجليزية -->
    <!-- Scheherazade New: الطباعة والـ PDF -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Scheherazade+New:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* Base font before React loads */
      html {
        font-family: 'IBM Plex Arabic', 'IBM Plex Sans', sans-serif;
        /* Force Latin numerals (0-9) always — prevents Arabic-Indic digits */
        font-variant-numeric: lining-nums tabular-nums;
        -moz-font-feature-settings: "lnum" 1, "tnum" 1;
        -webkit-font-feature-settings: "lnum" 1, "tnum" 1;
        font-feature-settings: "lnum" 1, "tnum" 1;
      }
      @media print {
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        html, body {
          font-family: 'Scheherazade New', 'IBM Plex Arabic', 'IBM Plex Sans', sans-serif !important;
          direction: rtl !important;
          unicode-bidi: plaintext !important;
        }
        /* Force Latin numerals in print too */
        * {
          font-variant-numeric: lining-nums tabular-nums !important;
          font-feature-settings: "lnum" 1, "tnum" 1 !important;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
